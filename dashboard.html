<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* Top bar */
.top-bar {
    padding: 10px;
    background: #f5f5f5;
    display: flex;
    gap: 10px;
    align-items: center;
}

/* PDF viewer */
iframe {
    width: 100%;
    height: 85vh;
    border: none;
}

/* Message */
#message {
    text-align: center;
    margin-top: 10px;
    font-size: 18px;
    color: red;
}
</style>
</head>

<body>

<div class="top-bar">
    <label>Month:</label>
    <select id="month">
        <option value="01">Jan</option>
        <option value="02">Feb</option>
        <option value="03" selected>Mar</option>
        <option value="04">Apr</option>
        <option value="05">May</option>
        <option value="06">Jun</option>
        <option value="07">Jul</option>
        <option value="08">Aug</option>
        <option value="09">Sep</option>
        <option value="10">Oct</option>
        <option value="11">Nov</option>
        <option value="12">Dec</option>
    </select>

    <label>Year:</label>
    <select id="year">
        <option value="2025">2025</option>
        <option value="2026" selected>2026</option>
    </select>

    <button onclick="loadPayslip()">View</button>
</div>

<p id="message"></p>

<iframe id="pdfFrame"></iframe>

<!-- Logout Button -->
<div style="text-align:center; margin: 10px 0;">
    <button onclick="logout()" 
        style="
            background-color:#007bff;
            color:white;
            border:none;
            padding:8px 16px;
            border-radius:4px;
            cursor:pointer;
            transition: background-color 0.3s;
        "
        onmouseover="this.style.backgroundColor='#0056b3'"
        onmouseout="this.style.backgroundColor='#007bff'"
    >
        Logout
    </button>
</div>

<script>
//  Prevent direct access without login
const empId = localStorage.getItem("employee_id");

if (!empId) {
    window.location.href = "index.html";
}

//  Load payslip
function loadPayslip() {
    const month = document.getElementById("month").value;
    const year = document.getElementById("year").value;
    const message = document.getElementById("message");
    const frame = document.getElementById("pdfFrame");

    message.innerText = "";
    frame.src = "";

    fetch("http://127.0.0.1:5000/payslip", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            employee_id: empId,
            month: month,
            year: year
        })
    })
    .then(res => {
        if (!res.ok) throw new Error();
        return res.json();
    })
    .then(data => {
        frame.src = "http://127.0.0.1:5000/" + data.file_path;
    })
    .catch(() => {
        message.innerText = "No data available";
    });
}

//  Logout
function logout() {
    localStorage.removeItem("employee_id");
    window.location.href = "index.html";
}

// Load default payslip on open
window.onload = loadPayslip;
</script>

</body>
</html>
