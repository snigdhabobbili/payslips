<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Employee Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> <!-- loads bootstrap css, gives ready made styles-->

<style>
body {
    background: linear-gradient(to right, rgb(235, 222, 222), rgb(161, 174, 194));
}

.login-card {
    width: 380px;
    margin: 100px auto;
    padding: 30px;
    border-radius: 12px;
    background: white;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

h3 {
    text-align: center;
}

.sub-text {
    text-align: center;
    color: gray;
    margin-bottom: 20px;
}

#captchaText {
    font-weight: bold;
    letter-spacing: 3px;
    font-size: 18px;
}

#errorMsg {
    text-align: center;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="login-card">
    <h3>Employee Payslip Login</h3>
    <p class="sub-text">Enter your credentials to access your account.</p>

    <form id="loginForm" autocomplete="off">

        <!-- Employee ID -->
        <div class="mb-3">
            <input type="text" id="employee_id" class="form-control"
                   placeholder="Enter your Employee ID" required>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <input type="password" id="password" class="form-control"
                   placeholder="Enter your password" required>
        </div>

        <!-- Captcha -->
        <div class="mb-3">
            <div id="captchaText" class="mb-2"></div>
            <input type="text" id="captcha" class="form-control"
                   placeholder="Enter captcha" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Log In</button>
    </form>

    <p id="errorMsg" class="text-danger"></p>
</div>

<script>
function generateCaptcha() {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";
    let captcha = "";
    for (let i = 0; i < 5; i++) {
        captcha += chars[Math.floor(Math.random() * chars.length)];
    }
    document.getElementById("captchaText").innerText = captcha;
}

window.onload = generateCaptcha;

document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const empId = document.getElementById("employee_id").value.trim();
    const password = document.getElementById("password").value;
    const captchaInput = document.getElementById("captcha").value;
    const captchaActual = document.getElementById("captchaText").innerText;
    const errorMsg = document.getElementById("errorMsg");

    errorMsg.innerText = "";

    // 🔹 Validate Employee ID (8 characters, letters + numbers)
    const pattern = /^[A-Za-z0-9]{8}$/;
    if (!pattern.test(empId)) {
        errorMsg.innerText = "Invalid ID";
        return;
    }

    // 🔹 Validate captcha
    if (captchaInput !== captchaActual) {
        errorMsg.innerText = "Invalid captcha";
        generateCaptcha();
        return;
    }

    // Call backend
    fetch("http://127.0.0.1:5000/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            employee_id: empId,
            password: password
        })
    })
    .then(res => {
        if (!res.ok) throw new Error();
        return res.json();
    })
    .then(data => {
        // ]Save employee ID
        localStorage.setItem("employee_id", empId);

        //  Go to dashboard
        window.location.href = "dashboard.html";
    })
    .catch(() => {
        errorMsg.innerText = "Wrong credentials";
    });
});
</script>

</body>
</html>
