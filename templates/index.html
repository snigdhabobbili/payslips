<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Employee Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #eef2ff, #e0f2fe);
}

.login-card {
    width: 380px;
    margin: 100px auto;
    padding: 30px;
    border-radius: 12px;
    background: white;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

#captchaText {
    font-weight: bold;
    letter-spacing: 3px;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="login-card">
    <h3 class="text-center">Employee Payslip Login</h3>
    <p class="text-center text-muted">Enter your credentials</p>

    <form id="loginForm" autocomplete="off">

        <!-- Employee ID -->
        <input type="text" id="employee_id" class="form-control mb-3"
               placeholder="Employee ID" required>

        <!-- Password -->
        <input type="password" id="password" class="form-control mb-3"
               placeholder="Password" required>

        <!-- CAPTCHA -->
        <div class="mb-3">
            <div id="captchaText" class="mb-2"></div>
            <input type="text" id="captchaInput" class="form-control"
                   placeholder="Enter captcha" required>
        </div>

        <button class="btn btn-primary w-100">Login</button>
    </form>

    <p id="errorMsg" class="text-danger text-center mt-2"></p>
</div>

<script>

// 🔐 Generate captcha
function generateCaptcha() {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    let captcha = "";

    for (let i = 0; i < 5; i++) {
        captcha += chars[Math.floor(Math.random() * chars.length)];
    }

    document.getElementById("captchaText").innerText = captcha;
}

window.onload = generateCaptcha;


// 🔐 Login submit
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const empId = document.getElementById("employee_id").value.trim();
    const password = document.getElementById("password").value;
    const captchaInput = document.getElementById("captchaInput").value;
    const captchaActual = document.getElementById("captchaText").innerText;

    const errorMsg = document.getElementById("errorMsg");
    errorMsg.innerText = "";

    // ID validation
    if (!/^[0-9]{8}$/.test(empId)) {
        errorMsg.innerText = "Invalid Employee ID";
        return;
    }

    // CAPTCHA validation
    if (captchaInput !== captchaActual) {
        errorMsg.innerText = "Invalid captcha";
        generateCaptcha();
        return;
    }

    // Backend login
    fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            employee_id: empId,
            password: password
        })
    })
    .then(res => {
        if (!res.ok) throw new Error();
        return res.json();
    })
    .then(() => {
        localStorage.setItem("employee_id", empId);
        window.location.href = "/static/dashboard.html";
    })
    .catch(() => {
        errorMsg.innerText = "Wrong credentials";
    });
});

</script>

</body>
</html>
