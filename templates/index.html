<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payslip Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #e3f0ff, #f7faff);
    font-family: 'Segoe UI', sans-serif;
}

.login-card {
    width: 420px;
    padding: 35px;
    border-radius: 16px;
    background: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
}

.form-control {
    border-radius: 12px;
    height: 45px;
    margin-bottom: 15px;
}

.captcha {
    background: #f1f1f1;
    border-radius: 10px;
    height: 45px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding-left: 15px;
    font-weight: bold;
    letter-spacing: 2px;
    font-family: monospace;
}

.login-btn {
    width: 100%;
    height: 45px;
    border-radius: 12px;
    background: linear-gradient(90deg, #2b7cff, #0056d6);
    color: white;
    border: none;
}
</style>
</head>

<body>

<div class="login-card">

    <h4>Payslip Portal</h4>

    <input type="text" id="employee_id" class="form-control"
           placeholder="Employee ID" autocomplete="off">

    <input type="password" id="password" class="form-control"
           placeholder="Password" autocomplete="new-password">

    <div class="captcha" id="captcha-text"></div>
    <input type="text" id="captcha-input" class="form-control mt-2"
           placeholder="Enter captcha" autocomplete="off">

    <button class="login-btn mt-2" onclick="login()">Login</button>

</div>

<script>
let currentCaptcha = "";

function generateCaptcha() {
    const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
    let c = "";
    for (let i = 0; i < 5; i++) {
        c += chars[Math.floor(Math.random() * chars.length)];
    }
    currentCaptcha = c;
    document.getElementById("captcha-text").innerText = c;
}

window.onload = generateCaptcha;

function login() {
    const emp = document.getElementById("employee_id").value;
    const pass = document.getElementById("password").value;
    const cap = document.getElementById("captcha-input").value;

    if (cap !== currentCaptcha) {
        alert("Invalid captcha");
        generateCaptcha();
        return;
    }

    fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({employee_id: emp, password: pass})
    })
    .then(res => {
        if (res.ok) {
            localStorage.setItem("employee_id", emp);
            window.location.href = "/dashboard";
        } else {
            alert("Invalid credentials");
            generateCaptcha();
        }
    });
}
</script>

</body>
</html>
