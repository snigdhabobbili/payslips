<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payslip Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #f5f7fa;
    font-family: Arial, sans-serif;
}

/* TOP BAR */
.top-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    background: white;
    border-bottom: 1px solid #ddd;
}

.logout-btn {
    margin-left: auto;
}

/* LABEL */
#label {
    padding: 10px;
    font-weight: 500;
}

/* PDF */
iframe {
    width: 100%;
    height: calc(100vh - 110px);
    border: none;
}

/* CHAT BUTTON */
.chat-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #2b7cff;
    color: white;
    border-radius: 50%;
    width: 55px;
    height: 55px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    font-size: 22px;
}

/* CHAT BOX */
#chat-box {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 300px;
    height: 420px;
    background: white;
    border-radius: 12px;
    display: none;
    flex-direction: column;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

.chat-header {
    background: #2b7cff;
    color: white;
    padding: 10px;
    border-radius: 12px 12px 0 0;
}

#chat-messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.chat-input-area {
    display: flex;
}

.chat-input-area input {
    flex: 1;
    border: none;
    padding: 10px;
}

.chat-input-area button {
    background: #2b7cff;
    color: white;
    border: none;
    padding: 10px;
}

/* CHAT MESSAGES */
.user-msg {
    background: #2b7cff;
    color: white;
    padding: 6px;
    border-radius: 6px;
    margin: 5px;
    text-align: right;
}

.bot-msg {
    background: #eee;
    padding: 6px;
    border-radius: 6px;
    margin: 5px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <select id="month" class="form-select" style="width:120px;">
        <option value="01">Jan</option>
        <option value="02">Feb</option>
        <option value="03">Mar</option>
        <option value="04">Apr</option>
        <option value="05">May</option>
        <option value="06">Jun</option>
        <option value="07">Jul</option>
        <option value="08">Aug</option>
        <option value="09">Sep</option>
        <option value="10">Oct</option>
        <option value="11">Nov</option>
        <option value="12">Dec</option>
    </select>

    <select id="year" class="form-select" style="width:120px;">
        <option>2026</option>
        <option>2025</option>
        <option>2024</option>
    </select>

    <button class="btn btn-primary" onclick="loadSelected()">View</button>

    <button class="btn btn-danger logout-btn" onclick="logout()">Logout</button>
</div>

<!-- LABEL -->
<div id="label">Loading...</div>

<!-- PDF -->
<iframe id="pdfFrame"></iframe>

<!-- CHAT BUTTON -->
<div class="chat-toggle" onclick="toggleChat()">💬</div>

<!-- CHAT BOX -->
<div id="chat-box">
    <div class="chat-header">Virtual Assistant</div>
    <div id="chat-messages"></div>
    <div class="chat-input-area">
        <input 
    id="chat-input" 
    placeholder="Ask (e.g. March 2026)" 
    autocomplete="off"
    autocorrect="off"
    autocapitalize="off"
    spellcheck="false">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const emp_id = localStorage.getItem("employee_id");

    function el(id) {
        return document.getElementById(id);
    }

    const monthNames = {
        "01":"January","02":"February","03":"March","04":"April",
        "05":"May","06":"June","07":"July","08":"August",
        "09":"September","10":"October","11":"November","12":"December"
    };

    const monthMap = {
        "01": "january","02": "february","03": "march",
        "04": "april","05": "may","06": "june",
        "07": "july","08": "august","09": "september",
        "10": "october","11": "november","12": "december"
    };

    if (!emp_id) {
        window.location.href = "/";
        return;
    }

    /* LOAD LATEST */
    function loadLatest() {
        fetch(`/latest/${emp_id}`)
        .then(res => res.json())
        .then(data => {
            if (data.file) el("pdfFrame").src = data.file;

            if (data.month && data.year) {
                el("month").value = data.month;
                el("year").value = data.year;

                // ✅ FIX: correct label
                el("label").innerText =
                    `Showing ${monthNames[data.month]} ${data.year} Payslip`;
            }
        });
    }

    /* LOAD SELECTED */
    function loadSelected() {
        const m = el("month").value;
        const y = el("year").value;

        fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                message: `${monthMap[m]} ${y}`,
                employee_id: emp_id
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.file) el("pdfFrame").src = data.file;

            if (data.month && data.year) {
                el("month").value = data.month;
                el("year").value = data.year;

                // ✅ FIX: always correct label
                el("label").innerText =
                    `Showing ${monthNames[data.month]} ${data.year} Payslip`;
            }
        });
    }

    /* CHAT */
    function toggleChat() {
        const box = el("chat-box");
        box.style.display = box.style.display === "none" ? "flex" : "none";
    }

    function addUserMessage(msg) {
        const box = el("chat-messages");
        const div = document.createElement("div");
        div.className = "user-msg";
        div.innerText = msg;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function addBotMessage(msg) {
        const box = el("chat-messages");
        const div = document.createElement("div");
        div.className = "bot-msg";
        div.innerText = msg;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }
function sendMessage() {
    const input = document.getElementById("chat-input");
    let msg = input.value;

    if (!msg.trim()) return;

    // 🔥 NEW: remember last message
    if (!window.lastQuery) window.lastQuery = "";

    // If only year is typed → combine
    if (/^\d{4}$/.test(msg) && window.lastQuery) {
        msg = window.lastQuery + " " + msg;
    }

    // Save last query (only if contains month)
    if (!/^\d{4}$/.test(msg)) {
        window.lastQuery = msg;
    }

    addUserMessage(msg);

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            message: msg,
            employee_id: emp_id
        })
    })
    .then(res => res.json())
    .then(data => {

        if (data.reply) addBotMessage(data.reply);

        if (data.file) {
            document.getElementById("pdfFrame").src = data.file;
        }

        if (data.month && data.year) {
            document.getElementById("month").value = data.month;
            document.getElementById("year").value = data.year;

            const monthNames = {
                "01":"January","02":"February","03":"March","04":"April",
                "05":"May","06":"June","07":"July","08":"August",
                "09":"September","10":"October","11":"November","12":"December"
            };

            document.getElementById("label").innerText =
                `Showing ${monthNames[data.month]} ${data.year} Payslip`;
        }
    });

    input.value = "";
}

    function logout() {
        localStorage.removeItem("employee_id");
        window.location.href = "/";
    }

    window.loadSelected = loadSelected;
    window.toggleChat = toggleChat;
    window.sendMessage = sendMessage;
    window.logout = logout;

    loadLatest();
});
</script>

</body>
</html>
