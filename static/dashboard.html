<!DOCTYPE html>
<html>
<head>
<title>Payslip Portal</title>

<style>
body { margin:0; font-family:Arial; background:#f1f5f9; }

/* HEADER */
.header {
    background:white;
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.controls select, .controls button {
    margin-right:10px;
    padding:6px 10px;
    border-radius:8px;
    border:1px solid #ddd;
}

button {
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover { background:#1e40af; }

.logout { background:#dc3545; }

#label { padding:10px 20px; color:#555; }

#pdfFrame { width:100%; height:85vh; border:none; }

/* CHAT */
#chatBtn {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#2563eb;
    color:white;
    width:55px;
    height:55px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

#chatWindow {
    display:none;
    position:fixed;
    bottom:90px;
    right:20px;
    width:300px;
    height:380px;
    background:white;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
    flex-direction:column;
}

#chatHeader {
    background:#2563eb;
    color:white;
    padding:10px;
    border-radius:12px 12px 0 0;
}

#chatMessages {
    flex:1;
    padding:10px;
    overflow-y:auto;
}

.bot { background:#e2e8f0; padding:8px; border-radius:8px; margin-bottom:8px; }
.user { background:#2563eb; color:white; padding:8px; border-radius:8px; margin-bottom:8px; text-align:right; }

#chatInputBox { display:flex; border-top:1px solid #ddd; }
#chatInputBox input { flex:1; padding:10px; border:none; }
#chatInputBox button { padding:10px; }
</style>
</head>

<body>

<div class="header">
    <div class="controls">
        <select id="month">
    <option value="01">Jan</option>
    <option value="02">Feb</option>
    <option value="03">Mar</option>
    <option value="04">Apr</option>
    <option value="05">May</option>
    <option value="06">Jun</option>
    <option value="07">Jul</option>
    <option value="08">Aug</option>
    <option value="09">Sep</option>
    <option value="10">Oct</option>
    <option value="11">Nov</option>
    <option value="12">Dec</option>
</select>

        <select id="year">
            <option>2024</option>
            <option>2025</option>
            <option selected>2026</option>
        </select>

        <button onclick="viewPayslip()">View</button>
    </div>

    <button class="logout" onclick="logout()">Logout</button>
</div>

<div id="label">Loading...</div>
<iframe id="pdfFrame"></iframe>

<div id="chatBtn" onclick="toggleChat()">💬</div>

<div id="chatWindow">
    <div id="chatHeader">Virtual Assistant</div>
    <div id="chatMessages">
        <div class="bot">Hi 👋 How can I help you?</div>
    </div>

    <div id="chatInputBox">
        <input id="chatInput" placeholder="Type message...">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
const empId = localStorage.getItem("employee_id");
if (!empId) window.location.href = "/";

/* ---------- LOAD LATEST ---------- */
window.onload = () => {
    fetch(`/latest/${empId}`)
    .then(res => res.json())
    .then(data => updateUI(data))
    .catch(() => {
        document.getElementById("label").innerText = "Failed to load payslip";
    });
};

/* ---------- UPDATE UI ---------- */
function updateUI(data) {

    const frame = document.getElementById("pdfFrame");
    const label = document.getElementById("label");

    // 🔥 remove old message
    const old = document.getElementById("noData");
    if (old) old.remove();

    // 🧠 CASE 1: chatbot asking question (NO file key)
    if (!("file" in data)) {
        // do NOTHING to UI
        return;
    }

    // ❌ CASE 2: explicit "not available"
    if (data.file === null) {
        frame.src = "";
        frame.style.display = "none";

        label.innerText = "";

        const div = document.createElement("div");
        div.id = "noData";
        div.innerText = "Not Available";

        div.style.position = "absolute";
        div.style.top = "50%";
        div.style.left = "50%";
        div.style.transform = "translate(-50%, -50%)";
        div.style.fontSize = "24px";
        div.style.color = "#555";

        document.body.appendChild(div);

        return;
    }

    // ✅ CASE 3: valid file
    frame.style.display = "block";
    frame.src = "/" + data.file;

    label.innerText = data.label;

    if (data.month) document.getElementById("month").value = data.month;
    if (data.year) document.getElementById("year").value = data.year;
}

/* ---------- DROPDOWN ---------- */
function viewPayslip() {
    const monthNum = document.getElementById("month").value;
    const year = document.getElementById("year").value;

    const monthMap = {
        "01": "january",
        "02": "february",
        "03": "march",
        "04": "april",
        "05": "may",
        "06": "june",
        "07": "july",
        "08": "august",
        "09": "september",
        "10": "october",
        "11": "november",
        "12": "december"
    };

    const message = monthMap[monthNum] + " " + year;

    fetch("/chat", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            message: message,
            employee_id: empId
        })
    })
    .then(res=>res.json())
    .then(data=>updateUI(data));

}

/* ---------- CHAT ---------- */
function sendMessage() {
    const msg = document.getElementById("chatInput").value;
    addMessage(msg, "user");

    fetch("/chat", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            message: msg,
            employee_id: empId
        })
    })
    .then(res=>res.json())
    .then(data=>{
        addMessage(data.reply, "bot");
        updateUI(data);
    });

    document.getElementById("chatInput").value="";
}

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = type;
    div.innerText = text;
    document.getElementById("chatMessages").appendChild(div);
}

/* ---------- CHAT TOGGLE ---------- */
function toggleChat() {
    const chat = document.getElementById("chatWindow");
    chat.style.display = chat.style.display === "flex" ? "none" : "flex";
}

/* ---------- LOGOUT ---------- */
function logout() {
    localStorage.removeItem("employee_id");
    window.location.href = "/";
}
</script>

</body>
</html>
